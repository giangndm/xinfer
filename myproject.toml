[build-system]
requires = ["maturin>=0.14,<0.15"]
build-backend = "maturin"

[project]
name = "xinfer"
description = "xInfer — a high-performance LLM inference engine in Rust. Install: pip install xinfer --index-url https://guoqingbao.github.io/xinfer/sm80/"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]

[tool.maturin]
python-source = "python"
include = ["xinfer/xinfer", "xinfer/__init__.py", "xinfer/__init__.pyi", "py.typed"]
sdist-include = ["ReadMe.md"]