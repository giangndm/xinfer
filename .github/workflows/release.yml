name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Validate that all package versions match the tag
  # ---------------------------------------------------------------------------
  validate:
    name: validate-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate package versions
        id: version
        run: |
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          npm_asset="$(node -p "require('./npm/package.json').assetVersion || require('./npm/package.json').version")"
          if [ "$cargo_version" != "$npm_asset" ]; then
            echo "Cargo.toml version ($cargo_version) must match npm/package.json assetVersion ($npm_asset)" >&2
            exit 1
          fi
          expected_tag="v${cargo_version}"
          if [ "${{ github.ref_name }}" != "$expected_tag" ]; then
            echo "Tag ${{ github.ref_name }} must match package version $expected_tag" >&2
            exit 1
          fi
          echo "version=${cargo_version}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # CUDA legacy builds: SM70/SM75 on GitHub-hosted runners (CUDA 12.9 image)
  # These older archs don't need flashinfer/cutlass and work on free runners.
  # ---------------------------------------------------------------------------
  cuda-legacy:
    name: cuda-${{ matrix.sm_name }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - sm: "70"
            sm_name: sm70
            cuda_version: "12.9.0"
            features: "cuda,nccl"
            python_features: "cuda,nccl,python"
          - sm: "75"
            sm_name: sm75
            cuda_version: "12.9.0"
            features: "cuda,nccl"
            python_features: "cuda,nccl,python"
    container:
      image: docker.io/nvidia/cuda:${{ matrix.cuda_version }}-cudnn-devel-ubuntu22.04
    env:
      CUDA_COMPUTE_CAP: ${{ matrix.sm }}
      DEBIAN_FRONTEND: noninteractive
      RAYON_NUM_THREADS: "16"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends --allow-change-held-packages \
            libnccl-dev libnccl2 \
            curl git ca-certificates \
            libssl-dev pkg-config \
            clang libclang-dev \
            python3-pip patchelf dpkg-dev
          rm -rf /var/lib/apt/lists/*

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maturin and cargo-deb
        run: |
          . "$HOME/.cargo/env"
          pip3 install --no-cache-dir maturin patchelf cffi
          cargo install cargo-deb

      - name: Build xinfer binary
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --bin xinfer --features "${{ matrix.features }}"

      - name: Build Python wheel
        run: |
          . "$HOME/.cargo/env"
          ./build.sh --release --features "${{ matrix.python_features }}"

      - name: Bundle CUDA runtime with binary
        run: |
          CUDA_LIB="$(find /usr/local/cuda -follow -name 'libcudart.so.*.*' -not -name '*.a' 2>/dev/null | head -1)"
          if [ -z "$CUDA_LIB" ]; then CUDA_LIB="$(ldconfig -p | grep 'libcudart.so\.' | awk '{print $NF}' | head -1)"; fi
          mkdir -p target/release/lib
          if [ -n "$CUDA_LIB" ]; then
            cp "$CUDA_LIB" target/release/lib/
            CUDA_SONAME="$(objdump -p "$CUDA_LIB" 2>/dev/null | awk '/SONAME/{print $2}')"
            if [ -n "$CUDA_SONAME" ]; then
              ln -sf "$(basename "$CUDA_LIB")" "target/release/lib/$CUDA_SONAME"
              ln -sf "$CUDA_SONAME" target/release/lib/libcudart.so
            fi
          fi
          patchelf --set-rpath '$ORIGIN/lib:/usr/local/lib/xinfer' target/release/xinfer
          ls -la target/release/lib/

      - name: Package deb
        run: |
          . "$HOME/.cargo/env"
          cargo deb --no-build --output "dist/xinfer-linux-x64-${{ matrix.sm_name }}.deb"

      - name: Package tar.gz
        run: |
          mkdir -p dist/xinfer
          cp target/release/xinfer dist/xinfer/xinfer
          cp -a target/release/lib dist/xinfer/lib
          tar -C dist/xinfer -czf "dist/xinfer-${{ needs.validate.outputs.version }}-linux-x64-${{ matrix.sm_name }}.tar.gz" xinfer lib
          rm -rf dist/xinfer

      - name: Collect and tag wheel with SM variant
        run: |
          mkdir -p dist/wheels
          for whl in target/wheels/*.whl; do
            base="$(basename "$whl")"
            tagged="$(echo "$base" | sed "s/-cp/-${{ matrix.sm }}-cp/")"
            cp "$whl" "dist/wheels/$tagged"
          done
          ls -la dist/wheels/

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-cuda-${{ matrix.sm_name }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/wheels/*.whl

  # ---------------------------------------------------------------------------
  # CUDA builds: SM80+ on self-hosted runner (CUDA 13.0 already installed)
  # Builds run sequentially (max-parallel: 1) switching CUDA_COMPUTE_CAP.
  # ---------------------------------------------------------------------------
  cuda:
    name: cuda-${{ matrix.sm_name }}
    runs-on: self-hosted
    needs: validate
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - sm: "80"
            sm_name: sm80
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
          - sm: "89"
            sm_name: sm89
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
          - sm: "90"
            sm_name: sm90
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
          - sm: "120"
            sm_name: sm120
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
    env:
      CUDA_COMPUTE_CAP: ${{ matrix.sm }}
      RAYON_NUM_THREADS: "128"
    steps:
      - uses: actions/checkout@v4

      - name: Clean previous build artifacts
        run: cargo clean 2>/dev/null || true

      - name: Build xinfer binary
        run: cargo build --release --bin xinfer --features "${{ matrix.features }}"

      - name: Build Python wheel
        run: ./build.sh --release --features "${{ matrix.python_features }}"

      - name: Bundle CUDA runtime with binary
        run: |
          CUDA_LIB="$(find /usr/local/cuda -follow -name 'libcudart.so.*.*' -not -name '*.a' 2>/dev/null | head -1)"
          if [ -z "$CUDA_LIB" ]; then CUDA_LIB="$(ldconfig -p | grep 'libcudart.so\.' | awk '{print $NF}' | head -1)"; fi
          mkdir -p target/release/lib
          if [ -n "$CUDA_LIB" ]; then
            cp "$CUDA_LIB" target/release/lib/
            CUDA_SONAME="$(objdump -p "$CUDA_LIB" 2>/dev/null | awk '/SONAME/{print $2}')"
            if [ -n "$CUDA_SONAME" ]; then
              ln -sf "$(basename "$CUDA_LIB")" "target/release/lib/$CUDA_SONAME"
              ln -sf "$CUDA_SONAME" target/release/lib/libcudart.so
            fi
          fi
          patchelf --set-rpath '$ORIGIN/lib:/usr/local/lib/xinfer' target/release/xinfer
          ls -la target/release/lib/

      - name: Package deb
        run: cargo deb --no-build --output "dist/xinfer-linux-x64-${{ matrix.sm_name }}.deb"

      - name: Package tar.gz
        run: |
          mkdir -p dist/xinfer
          cp target/release/xinfer dist/xinfer/xinfer
          cp -a target/release/lib dist/xinfer/lib
          tar -C dist/xinfer -czf "dist/xinfer-${{ needs.validate.outputs.version }}-linux-x64-${{ matrix.sm_name }}.tar.gz" xinfer lib
          rm -rf dist/xinfer

      - name: Collect and tag wheel with SM variant
        run: |
          mkdir -p dist/wheels
          for whl in target/wheels/*.whl; do
            base="$(basename "$whl")"
            tagged="$(echo "$base" | sed "s/-cp/-${{ matrix.sm }}-cp/")"
            cp "$whl" "dist/wheels/$tagged"
          done
          ls -la dist/wheels/

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-cuda-${{ matrix.sm_name }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/wheels/*.whl

  # ---------------------------------------------------------------------------
  # Metal build (macOS) — GitHub-hosted runner
  # ---------------------------------------------------------------------------
  metal:
    name: metal-${{ matrix.npm_target }}
    runs-on: macos-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-apple-darwin
            npm_target: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install maturin
        run: pip3 install --break-system-packages maturin

      - name: Build xinfer binary
        run: cargo build --release --target ${{ matrix.rust_target }} --bin xinfer --features "metal"

      - name: Build Python wheel
        run: maturin build --release --features "metal,python"

      - name: Package tar.gz
        run: |
          mkdir -p "dist/xinfer"
          cp "target/${{ matrix.rust_target }}/release/xinfer" "dist/xinfer/xinfer"
          tar -C dist/xinfer -czf "dist/xinfer-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}-metal.tar.gz" xinfer
          rm -rf dist/xinfer

      - name: Collect wheel
        run: |
          mkdir -p dist/wheels
          for whl in target/wheels/*.whl; do
            base="$(basename "$whl")"
            tagged="$(echo "$base" | sed 's/-cp/-metal-cp/')"
            cp "$whl" "dist/wheels/$tagged"
          done
          ls -la dist/wheels/

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-${{ matrix.npm_target }}-metal
          path: |
            dist/*.tar.gz
            dist/wheels/*.whl

  # ---------------------------------------------------------------------------
  # Checksums + GitHub Release
  # ---------------------------------------------------------------------------
  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: [validate, cuda-legacy, cuda, metal]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.whl" \) \
            -exec sha256sum {} + > SHA256SUMS
          cat SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-release-artifacts
          path: dist/*

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xInfer v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/wheels/*.whl
            dist/SHA256SUMS

  # ---------------------------------------------------------------------------
  # Publish wheel index to GitHub Pages (PEP 503 simple repository)
  # Each CUDA arch gets its own index URL:
  #   pip install xinfer --index-url https://guoqingbao.github.io/xinfer/sm80/  (default)
  #   pip install xinfer --index-url https://guoqingbao.github.io/xinfer/sm70/  (V100)
  #   pip install xinfer --index-url https://guoqingbao.github.io/xinfer/sm90/  (Hopper)
  #   pip install xinfer --index-url https://guoqingbao.github.io/xinfer/sm120/ (Blackwell)
  #   pip install xinfer --index-url https://guoqingbao.github.io/xinfer/metal/ (macOS)
  # The root index (no arch) defaults to SM80.
  # ---------------------------------------------------------------------------
  publish-index:
    name: publish-index
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build PEP 503 index
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          RELEASE_BASE="https://github.com/${REPO}/releases/download/${TAG}"

          generate_index() {
            local dir="$1" orig_name="$2" std_name="$3" sha="$4"
            mkdir -p "site/${dir}/xinfer"
            {
              echo '<!DOCTYPE html><html><body>'
              echo "<a href=\"${RELEASE_BASE}/${orig_name}#sha256=${sha}\">${std_name}</a><br/>"
              echo '</body></html>'
            } > "site/${dir}/xinfer/index.html"
            echo "<!DOCTYPE html><html><body><a href=\"xinfer/\">xinfer</a></body></html>" \
              > "site/${dir}/index.html"
          }

          for whl in dist/wheels/*.whl; do
            [ -f "$whl" ] || continue
            orig_name="$(basename "$whl")"
            sha="$(sha256sum "$whl" | cut -d' ' -f1)"

            # Detect variant tag from filename: SM number or "metal"
            tag="$(echo "$orig_name" | sed -n 's/.*-\([0-9]\{2,3\}\)-cp.*/\1/p')"
            if [ -n "$tag" ]; then
              std_name="$(echo "$orig_name" | sed "s/-${tag}-cp/-cp/")"
              generate_index "sm${tag}" "$orig_name" "$std_name" "$sha"
              if [ "$tag" = "80" ]; then
                mkdir -p "site/xinfer"
                cp "site/sm${tag}/xinfer/index.html" "site/xinfer/index.html"
              fi
            elif echo "$orig_name" | grep -q '\-metal\-cp'; then
              std_name="$(echo "$orig_name" | sed 's/-metal-cp/-cp/')"
              generate_index "metal" "$orig_name" "$std_name" "$sha"
            fi
          done

          echo '<!DOCTYPE html><html><body><a href="xinfer/">xinfer</a></body></html>' > site/index.html

          # Auto-detect install script
          cat > site/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          VERSION="__VERSION__"
          INDEX_BASE="https://guoqingbao.github.io/xinfer"
          RELEASE_BASE="https://github.com/__REPO__/releases/download/v${VERSION}"

          detect_platform() {
            if [ "$(uname -s)" = "Darwin" ]; then
              echo "metal"
              return
            fi
            if ! command -v nvidia-smi &>/dev/null; then
              echo "ERROR: No NVIDIA GPU detected and no platform specified." >&2
              echo "  Set XINFER_PLATFORM=sm80 (or sm70/sm75/sm89/sm90/sm120) and re-run." >&2
              exit 1
            fi
            local cc
            cc="$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader,nounits | head -1 | tr -d '[:space:]' | tr -d '.')"
            case "$cc" in
              70|72) echo "sm70" ;;
              75)    echo "sm75" ;;
              80|86) echo "sm80" ;;
              89)    echo "sm89" ;;
              90|90a) echo "sm90" ;;
              100|120) echo "sm${cc}" ;;
              *) echo "sm80" ;;
            esac
          }

          PLATFORM="${XINFER_PLATFORM:-$(detect_platform)}"
          echo "Detected platform: ${PLATFORM}"
          echo ""

          need_sudo() {
            [ "$(id -u)" -ne 0 ]
          }

          SUDO=""
          if need_sudo; then
            if command -v sudo &>/dev/null; then
              SUDO="sudo"
            fi
          fi

          print_binary_hints() {
            echo ""
            echo "============================================"
            echo " xInfer binary installed"
            echo "============================================"
            echo ""
            echo " HuggingFace model:"
            echo "   xinfer --m Qwen/Qwen3-8B --ui-server"
            echo ""
            echo " Local model path:"
            echo "   xinfer --w /path/to/model --ui-server"
            echo ""
            echo " API server (no UI):"
            echo "   xinfer --m Qwen/Qwen3-8B --server"
            echo "============================================"
          }

          install_deb() {
            local variant="$1"
            local deb="xinfer-linux-x64-${variant}.deb"
            local url="${RELEASE_BASE}/${deb}"
            local tmp
            tmp="$(mktemp -d)"
            echo "Downloading ${deb}..."
            if ! curl -fSL -o "${tmp}/${deb}" "$url"; then
              echo "ERROR: Failed to download ${url}" >&2
              rm -rf "$tmp"
              return 1
            fi
            echo "Installing ${deb}..."
            if ! ${SUDO} dpkg -i "${tmp}/${deb}"; then
              echo ""
              echo "ERROR: dpkg -i failed. You may need root privileges:" >&2
              echo "  sudo dpkg -i ${tmp}/${deb}" >&2
              echo "  Or re-run with: curl -sSL ${INDEX_BASE}/install.sh | sudo bash" >&2
              return 1
            fi
            rm -rf "$tmp"
            print_binary_hints
          }

          install_tarball() {
            local tarball="$1"
            local url="${RELEASE_BASE}/${tarball}"
            local install_dir="/usr/local/bin"
            local lib_dir="/usr/local/lib/xinfer"
            local tmp
            tmp="$(mktemp -d)"
            echo "Downloading ${tarball}..."
            if ! curl -fSL -o "${tmp}/${tarball}" "$url"; then
              echo "ERROR: Failed to download ${url}" >&2
              rm -rf "$tmp"
              return 1
            fi
            echo "Extracting..."
            tar -xzf "${tmp}/${tarball}" -C "${tmp}"
            echo "Installing xinfer to ${install_dir}..."
            if ! ${SUDO} install -m 755 "${tmp}/xinfer" "${install_dir}/xinfer"; then
              echo ""
              echo "ERROR: Could not install to ${install_dir}." >&2
              echo "  Try: sudo install -m 755 ${tmp}/xinfer ${install_dir}/xinfer" >&2
              echo "  Or re-run with: curl -sSL ${INDEX_BASE}/install.sh | sudo bash" >&2
              return 1
            fi
            if [ -d "${tmp}/lib" ]; then
              ${SUDO} mkdir -p "${lib_dir}"
              ${SUDO} cp -a "${tmp}/lib/"* "${lib_dir}/"
            fi
            rm -rf "$tmp"
            print_binary_hints
          }

          install_pip() {
            local platform="$1"
            local PIP=""
            if command -v pip3 &>/dev/null; then
              PIP=pip3
            elif command -v pip &>/dev/null; then
              PIP=pip
            else
              echo "ERROR: pip not found. Install Python 3 first." >&2
              return 1
            fi
            echo "Installing: ${PIP} install xinfer --index-url ${INDEX_BASE}/${platform}/"
            if ! ${PIP} install xinfer --index-url "${INDEX_BASE}/${platform}/"; then
              echo ""
              echo "ERROR: pip install failed." >&2
              echo "  Try: ${SUDO:+sudo }${PIP} install xinfer --index-url ${INDEX_BASE}/${platform}/" >&2
              return 1
            fi
            echo ""
            echo "============================================"
            echo " xInfer installed via Python package"
            echo "============================================"
            echo ""
            echo " HuggingFace model:"
            echo "   python3 -m xinfer.server --m Qwen/Qwen3-8B --ui-server"
            echo ""
            echo " Local model path:"
            echo "   python3 -m xinfer.server --w /path/to/model --ui-server"
            echo ""
            echo " API server (no UI):"
            echo "   python3 -m xinfer.server --m Qwen/Qwen3-8B --server"
            echo "============================================"
          }

          if [ "$PLATFORM" = "metal" ]; then
            TARBALL="xinfer-${VERSION}-darwin-arm64-metal.tar.gz"
            echo "Install options:"
            echo "  1) binary  — installs 'xinfer' to /usr/local/bin"
            echo "  2) pip     — installs 'python3 -m xinfer.server'"
            echo ""
          else
            TARBALL="xinfer-${VERSION}-linux-x64-${PLATFORM}.tar.gz"
            echo "Install options:"
            echo "  1) deb package  — installs 'xinfer' system-wide (Linux)"
            echo "  2) pip package  — installs 'python3 -m xinfer.server'"
            echo "  3) binary       — installs 'xinfer' to /usr/local/bin"
            echo ""
          fi

          MODE="${XINFER_MODE:-}"
          if [ -z "$MODE" ]; then
            if [ -e /dev/tty ]; then
              printf "Choose [1/2%s] (default: 1): " "$([ "$PLATFORM" != "metal" ] && echo "/3")"
              read -r MODE < /dev/tty
              MODE="${MODE:-1}"
            else
              MODE="1"
            fi
          fi

          if [ "$PLATFORM" = "metal" ]; then
            case "$MODE" in
              1|binary)  install_tarball "$TARBALL" ;;
              2|pip)     install_pip "$PLATFORM" ;;
              *)         echo "Invalid choice: $MODE"; exit 1 ;;
            esac
          else
            case "$MODE" in
              1|deb)     install_deb "$PLATFORM" ;;
              2|pip)     install_pip "$PLATFORM" ;;
              3|binary)  install_tarball "$TARBALL" ;;
              *)         echo "Invalid choice: $MODE"; exit 1 ;;
            esac
          fi
          SCRIPT

          # Substitute version and repo into the script
          sed -i "s|__VERSION__|${VERSION}|g" site/install.sh
          sed -i "s|__REPO__|${REPO}|g" site/install.sh
          sed -i 's/^          //' site/install.sh
          chmod +x site/install.sh

          echo "=== Generated indexes ==="
          for idx in site/*/xinfer/index.html site/xinfer/index.html; do
            [ -f "$idx" ] && echo "--- $idx ---" && cat "$idx"
          done

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deploy

  # ---------------------------------------------------------------------------
  # Publish npm package
  # ---------------------------------------------------------------------------
  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    environment: xInfer
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip when NPM_TOKEN is not configured
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping npm publish."
      - uses: actions/checkout@v4
        if: env.NODE_AUTH_TOKEN != ''
      - uses: actions/setup-node@v4
        if: env.NODE_AUTH_TOKEN != ''
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sync npm package version with release tag
        if: env.NODE_AUTH_TOKEN != ''
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            pkg.assetVersion = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish npm package
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish ./npm --access public --provenance
